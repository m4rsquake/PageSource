# -- Site Configuration --
# Hextra Theme Configuration
# https://imfing.github.io/hextra/

theme = "hextra"
baseURL = "https://m4rsquake.github.io/"
title = "m4rsquake's Blog"
defaultContentLanguage = "en"
languageCode = "en"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

hasCJKLanguage = true

buildDrafts = false
buildFuture = false

googleAnalytics = "G-YGF31E13C5"

[pagination]
  pagerSize = 100

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[sitemap]
  changefreq = 'always'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "authors"
        weight = 20

    [[related.indices]]
        name = "date"
        weight = 10

    [[related.indices]]
      applyFilter = false
      name = 'fragmentrefs'
      type = 'fragments'
      weight = 10
