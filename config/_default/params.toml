# -- Hextra Theme Parameters --
# For more details: https://imfing.github.io/hextra/docs/guide/configuration/

# 网站描述
description = "m4rsquake's personal blog - sharing knowledge about programming, Qt, and more"

# 主要内容区域
mainSections = ["pages", "posts", "docs"]

# 启用搜索功能
enableSearch = true
enableCodeCopy = true

# 代码高亮
[navbar]
  displayTitle = true
  displayLogo = false

[page]
  # 侧边栏宽度
  width = "normal"

[editPage]
  enable = true
  repoURL = "https://github.com/m4rsquake/PageSource"
  branch = "main"
  path = "content"

[footer]
  enable = true
  displayCopyright = true
  displayPoweredBy = true

# 主题外观
[theme]
  # 默认外观: light, dark, auto
  default = "auto"
  displayToggle = true

